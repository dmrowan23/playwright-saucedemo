name: Playwright Tests

on:
  # Run on every push to main or develop
  push:
    branches: [main, develop]
  # Run on every pull request targeting main
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Don't cancel all shards if one fails — see full results
      fail-fast: false
      matrix:
        # Shard tests across 3 parallel runners to speed up CI
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache npm dependencies to speed up installs
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          # Credentials come from GitHub Actions secrets — never hardcode these
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          STANDARD_USER: ${{ secrets.STANDARD_USER || 'standard_user' }}
          PASSWORD: ${{ secrets.PASSWORD || 'secret_sauce' }}
          CI: true

      # Upload the blob report from each shard — merged in the next job
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

  # Merge shard reports and publish a single HTML report
  merge-reports:
    name: Merge & Publish Test Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports into HTML
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
